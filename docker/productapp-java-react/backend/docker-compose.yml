version: '3.8'
networks:
  app_network:

services:
  db:
    image: mysql:8
    container_name: mysqldb
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: items
    volumes:
      - ./mysqldata:/var/lib/mysql
    networks:
      - app_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8082:80"
    networks:
      - app_network

  backend:
    image: productapp-java-react_backend:latest
    container_name: product_app_backend
    ports:
      - "8080:8080"
    volumes:
      - ./application.properties:/app/config/application.properties
    environment:
      SPRING_CONFIG_LOCATION: 'file:/app/config/application.properties'
    depends_on:
      - db
    networks:
      - app_network
