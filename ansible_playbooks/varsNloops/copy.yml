---
- hosts: all
  become: yes

  tasks:
  - name: Copy files using loops
    copy:
      src: "{{ item.src }}"
      dest: "{{ item.dest }}"
      owner: "{{ item.owner }}"
      group: "{{ item.group }}"
      mode: "{{ item.mode }}"
    loop:
    - src: /home/nixhal/cmpunk_cop.lyric
      dest: /devops
      owner: nixhal
      group: narendra
      mode: '700'
      
    - src: /home/nixhal/warpigs.lyric
      dest: /devops
      owner: nixhal
      group: root
      mode: 555

    - src: /home/nixhal/despasito.lyric
      dest: /devops
      owner: narendra
      group: root
      mode: 755

